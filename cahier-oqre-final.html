<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cahier d'écriture OQRE – 6e année</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3B82F6;
    --blue-light: #EFF6FF;
    --blue-dark: #1D4ED8;
    --green: #22C55E;
    --green-light: #F0FDF4;
    --orange: #F97316;
    --orange-light: #FFF7ED;
    --purple: #A855F7;
    --purple-light: #FAF5FF;
    --red: #EF4444;
    --red-light: #FEF2F2;
    --yellow: #EAB308;
    --yellow-light: #FEFCE8;
    --gray: #6B7280;
    --gray-light: #F9FAFB;
    --white: #FFFFFF;
    --text: #1F2937;
    --text-soft: #374151;
    --border: #E5E7EB;
    --shadow: 0 4px 24px rgba(59,130,246,0.10);
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #EFF6FF 0%, #FAF5FF 50%, #F0FDF4 100%);
    min-height: 100vh;
    color: var(--text);
  }

  .header {
    background: linear-gradient(135deg, #1D4ED8 0%, #7C3AED 100%);
    padding: 28px 32px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 4px 20px rgba(29,78,216,0.25);
  }
  .header-icon { font-size: 2.6rem; }
  .header-text h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.75rem;
    color: #fff;
    font-weight: 800;
    line-height: 1.1;
  }
  .header-text p { color: rgba(255,255,255,0.82); font-size: 0.95rem; margin-top: 2px; }

  .container { max-width: 960px; margin: 0 auto; padding: 28px 18px 60px; }

  .tabs-label { font-weight: 700; color: var(--gray); margin-bottom: 10px; letter-spacing: .03em; text-transform: uppercase; font-size: .8rem; }
  .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
  .tab-btn {
    padding: 9px 18px; border-radius: 50px; border: 2px solid var(--border);
    background: var(--white); cursor: pointer; font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.9rem; color: var(--gray); transition: all .2s;
  }
  .tab-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 2px 10px rgba(59,130,246,.3); }

  .subject-card {
    background: var(--white); border-radius: var(--radius); padding: 28px 32px;
    box-shadow: var(--shadow); margin-bottom: 24px; border: 1.5px solid var(--border);
  }
  .subject-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .subject-emoji { font-size: 2.4rem; }
  .subject-meta h2 { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800; color: var(--blue-dark); line-height: 1.2; }
  .subject-meta .type-badge {
    display: inline-block; background: var(--purple-light); color: var(--purple);
    font-size: .8rem; font-weight: 700; border-radius: 50px; padding: 3px 12px; margin-top: 6px;
  }

  .consignes { background: var(--blue-light); border-radius: var(--radius-sm); padding: 16px 20px; margin-bottom: 20px; }
  .consignes h3 { font-size: .95rem; font-weight: 800; color: var(--blue-dark); margin-bottom: 8px; }
  .consignes ul { list-style: none; }
  .consignes ul li { font-size: .9rem; color: var(--text-soft); margin-bottom: 4px; padding-left: 20px; position: relative; }
  .consignes ul li::before { content: '✅'; position: absolute; left: 0; font-size: .8rem; }

  .strategies { background: var(--orange-light); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 22px; }
  .strategies h3 { font-size: .9rem; font-weight: 800; color: var(--orange); margin-bottom: 6px; }
  .strategies p { font-size: .88rem; color: var(--text-soft); line-height: 1.6; }

  .progress-area { margin-bottom: 22px; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label span { font-size: .85rem; font-weight: 700; color: var(--gray); }
  .progress-label .pct { color: var(--blue); font-size: 1rem; font-weight: 800; }
  .progress-bar-bg { background: var(--border); border-radius: 50px; height: 12px; overflow: hidden; }
  .progress-bar-fill { background: linear-gradient(90deg, var(--blue), var(--purple)); height: 100%; border-radius: 50px; transition: width .5s ease; }

  .word-count-area { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .word-count-pill {
    background: var(--gray-light); border: 1.5px solid var(--border); border-radius: 50px;
    padding: 5px 16px; font-size: .85rem; font-weight: 700; color: var(--gray);
    display: flex; align-items: center; gap: 6px;
  }
  .word-count-pill.ok { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .word-count-pill .count { font-size: 1.1rem; }

  .sections { display: flex; flex-direction: column; gap: 20px; }

  .section-block {
    border-radius: var(--radius-sm); border: 2px solid var(--border);
    background: var(--white); overflow: hidden; transition: border-color .2s;
  }
  .section-block.done { border-color: var(--green); }
  .section-block.active { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(59,130,246,.1); }

  .section-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    background: var(--gray-light); cursor: pointer; user-select: none;
  }
  .section-header:hover { background: var(--blue-light); }
  .section-header .sec-icon { font-size: 1.3rem; }
  .section-header .sec-title { font-weight: 800; font-size: 1rem; flex: 1; }
  .section-header .sec-status { font-size: .8rem; font-weight: 700; padding: 3px 10px; border-radius: 50px; }
  .sec-status.todo { background: var(--gray-light); color: var(--gray); border: 1.5px solid var(--border); }
  .sec-status.done { background: var(--green-light); color: var(--green); border: 1.5px solid var(--green); }

  .section-body { padding: 18px 20px; display: none; }
  .section-body.open { display: block; }

  .section-hint { font-size: .85rem; color: var(--gray); margin-bottom: 10px; line-height: 1.5; background: var(--yellow-light); border-radius: 8px; padding: 10px 14px; }

  textarea {
    width: 100%; min-height: 130px; border: 2px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-family: 'Nunito', sans-serif; font-size: .95rem;
    color: var(--text); resize: vertical; outline: none; transition: border-color .2s;
    line-height: 1.7;
  }
  textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

  .btn-verify {
    margin-top: 12px; padding: 11px 26px; background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: #fff; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: .95rem; font-weight: 800; cursor: pointer; transition: all .2s;
    box-shadow: 0 3px 12px rgba(59,130,246,.35); display: flex; align-items: center; gap: 8px;
  }
  .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,.4); }
  .btn-verify:disabled { opacity: .55; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.35);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .feedback-card { margin-top: 16px; border-radius: var(--radius-sm); overflow: hidden; border: 2px solid var(--border); animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .feedback-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    background: linear-gradient(135deg, #7C3AED, #3B82F6); color: #fff;
  }
  .feedback-header .score-badge {
    background: rgba(255,255,255,.2); border-radius: 50px; padding: 4px 14px;
    font-weight: 900; font-size: 1.1rem; margin-left: auto;
  }
  .feedback-header h4 { font-size: 1rem; font-weight: 800; }

  .feedback-body { padding: 18px 20px; background: var(--white); }

  .feedback-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .feedback-table th, .feedback-table td { border: 1.5px solid var(--border); padding: 9px 12px; font-size: .88rem; vertical-align: top; }
  .feedback-table th { background: var(--gray-light); font-weight: 800; font-size: .8rem; color: var(--gray); text-transform: uppercase; letter-spacing: .04em; }
  .feedback-table td.good { background: var(--green-light); color: #166534; }
  .feedback-table td.improve { background: var(--orange-light); color: #9A3412; }
  .feedback-table td.how { background: var(--blue-light); color: var(--blue-dark); }
  .feedback-table td.example { background: var(--purple-light); color: #6B21A8; font-style: italic; }
  .feedback-table td.next { background: var(--yellow-light); color: #854D0E; }

  .versions-area { margin-top: 16px; }
  .versions-area h4 { font-weight: 800; font-size: .95rem; margin-bottom: 10px; color: var(--blue-dark); }
  .version-block { border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; font-size: .9rem; line-height: 1.7; }
  .version-block.corrected { background: var(--green-light); border: 1.5px solid #86EFAC; }
  .version-block.improved { background: var(--purple-light); border: 1.5px solid #D8B4FE; }
  .version-label { font-weight: 800; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .version-label.corrected { color: var(--green); }
  .version-label.improved { color: var(--purple); }

  .global-score-card {
    background: linear-gradient(135deg, #1D4ED8, #7C3AED);
    border-radius: var(--radius); padding: 28px 32px; margin-top: 28px; color: #fff;
    text-align: center; box-shadow: 0 6px 28px rgba(29,78,216,.35);
  }
  .global-score-card h3 { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
  .level-circle {
    width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,.15);
    border: 4px solid rgba(255,255,255,.5); margin: 0 auto 12px; display: flex;
    align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900;
  }
  .global-score-card p { font-size: 1rem; opacity: .88; line-height: 1.6; }
  .badges-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  .badge { background: rgba(255,255,255,.18); border-radius: 50px; padding: 6px 16px; font-size: .85rem; font-weight: 700; }

  .encourage-bar {
    background: linear-gradient(90deg, #22C55E, #3B82F6); border-radius: 10px;
    padding: 10px 18px; margin-bottom: 18px; color: #fff; font-weight: 700; font-size: .92rem;
    display: flex; align-items: center; gap: 10px;
  }

  @media (max-width: 640px) {
    .header { padding: 18px 16px; }
    .header-text h1 { font-size: 1.3rem; }
    .subject-card { padding: 18px 16px; }
    .tabs { gap: 8px; }
    .tab-btn { font-size: .82rem; padding: 7px 13px; }
    .feedback-table { font-size: .8rem; }
    .feedback-table th, .feedback-table td { padding: 7px 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📝</div>
  <div class="header-text">
    <h1>Cahier d'écriture OQRE</h1>
    <p>6e année · Prépare-toi avec confiance !</p>
  </div>
</div>

<div class="container">
  <div class="tabs-label">Choisis ton sujet d'écriture :</div>
  <div class="tabs" id="subjectTabs"></div>
  <div id="subjectContent"></div>
</div>

<script>
const SUBJECTS = [
  {
    id: 0,
    emoji: "📚",
    title: "Les devoirs devraient-ils être interdits ?",
    type: "Texte d'opinion / persuasif",
    consignes: [
      "Prends une position claire (pour ou contre)",
      "Donne au moins 3 arguments bien développés",
      "Utilise des exemples précis pour appuyer tes arguments",
      "Adresse un argument contraire et réfute-le",
      "Termine par un appel à l'action ou une conclusion forte"
    ],
    strategies: "💡 Stratégies : Commence par planifier tes 3 arguments principaux. Utilise des connecteurs logiques (premièrement, de plus, en conclusion...). Pense à ton lecteur : qu'est-ce qui le convaincrait vraiment ?",
    sections: [
      { id: "plan", icon: "🗺️", title: "Idées clés & planification", hint: "Écris ta position, tes 3 arguments principaux et quelques exemples pour chaque argument. Ce n'est pas encore ton texte – c'est juste ta carte d'idées !" },
      { id: "intro", icon: "🚪", title: "Introduction", hint: "Commence par accrocher ton lecteur (question, fait surprenant, citation...). Présente ton sujet et énonce clairement ta position." },
      { id: "dev1", icon: "1️⃣", title: "Développement 1 – Premier argument", hint: "Présente ton premier argument. Donne un exemple précis. Explique pourquoi ça appuie ta position." },
      { id: "dev2", icon: "2️⃣", title: "Développement 2 – Deuxième argument", hint: "Présente ton deuxième argument. N'oublie pas d'utiliser un connecteur logique pour faire le lien avec le paragraphe précédent." },
      { id: "dev3", icon: "3️⃣", title: "Développement 3 – Troisième argument ou réfutation", hint: "Présente ton troisième argument OU aborde un argument contraire et explique pourquoi il ne tient pas." },
      { id: "concl", icon: "🏁", title: "Conclusion", hint: "Résume tes arguments, réaffirme ta position et termine par une phrase forte (appel à l'action, question rhétorique, etc.)." }
    ]
  },
  {
    id: 1,
    emoji: "🦸",
    title: "Quel superpouvoir aimerais-tu avoir ?",
    type: "Texte narratif / expressif",
    consignes: [
      "Décris le superpouvoir que tu choisirais et pourquoi",
      "Raconte une aventure où tu utilises ce pouvoir",
      "Développe les personnages et les émotions",
      "Utilise un vocabulaire descriptif et varié",
      "Crée une structure narrative claire : début, problème, solution, fin"
    ],
    strategies: "💡 Stratégies : Utilise des dialogues pour rendre ton texte vivant. Montre les émotions au lieu de les nommer (ex : au lieu de 'j'avais peur', écris 'mes mains tremblaient'). Crée de la tension narrative !",
    sections: [
      { id: "plan", icon: "🗺️", title: "Idées clés & planification", hint: "Quel pouvoir ? Quelle aventure ? Qui sont les personnages ? Quel est le problème à résoudre ? Note tes idées librement." },
      { id: "intro", icon: "🚪", title: "Introduction", hint: "Présente-toi (le narrateur) et ton univers. Décris comment tu as obtenu ton superpouvoir. Accroche le lecteur dès le début !" },
      { id: "dev1", icon: "1️⃣", title: "Développement 1 – Début de l'aventure", hint: "Décris la situation initiale. Quel problème ou quelle mission se présente ? Utilise des détails sensoriels (ce que tu vois, entends, ressens)." },
      { id: "dev2", icon: "2️⃣", title: "Développement 2 – Le cœur de l'aventure", hint: "C'est le moment le plus excitant ! Comment utilises-tu ton pouvoir ? Y a-t-il des obstacles ? Des émotions fortes ?" },
      { id: "dev3", icon: "3️⃣", title: "Développement 3 – La résolution", hint: "Comment l'aventure se termine-t-elle ? Qu'est-ce que tu as accompli ou appris ?" },
      { id: "concl", icon: "🏁", title: "Conclusion", hint: "Réfléchis sur cette expérience. Qu'est-ce que ce superpouvoir t'a appris sur toi-même ? Termine de façon mémorable." }
    ]
  },
  {
    id: 2,
    emoji: "🦁",
    title: "Les animaux devraient-ils vivre dans les zoos ?",
    type: "Texte argumentatif",
    consignes: [
      "Présente les deux côtés de la question avant de prendre position",
      "Utilise des faits et des exemples réels",
      "Structure tes arguments du plus faible au plus fort",
      "Utilise un vocabulaire précis lié aux animaux et à l'environnement",
      "Formule une conclusion nuancée et convaincante"
    ],
    strategies: "💡 Stratégies : Un bon texte argumentatif reconnaît les deux points de vue. Utilise des statistiques ou des faits (même inventés de façon réaliste) pour renforcer tes arguments. Montre que tu as réfléchi sérieusement.",
    sections: [
      { id: "plan", icon: "🗺️", title: "Idées clés & planification", hint: "Liste les arguments POUR et CONTRE les zoos. Quelle est ta position finale ? Quels sont tes 3 meilleurs arguments ?" },
      { id: "intro", icon: "🚪", title: "Introduction", hint: "Commence par une statistique ou un fait sur les animaux en captivité. Présente la question et annonce ta position." },
      { id: "dev1", icon: "1️⃣", title: "Développement 1 – Arguments pour ou contre", hint: "Présente ton premier argument avec des exemples concrets. Pense aux conditions de vie des animaux, à leur bien-être." },
      { id: "dev2", icon: "2️⃣", title: "Développement 2 – Deuxième argument", hint: "Développe ton deuxième point. Pense à la conservation des espèces, à l'éducation du public, aux animaux menacés." },
      { id: "dev3", icon: "3️⃣", title: "Développement 3 – Réfutation ou nuance", hint: "Aborde l'argument le plus fort du côté opposé et montre pourquoi ton point de vue reste plus valide." },
      { id: "concl", icon: "🏁", title: "Conclusion", hint: "Synthétise ta position. Propose peut-être une solution alternative (ex : sanctuaires naturels). Termine avec une phrase qui fait réfléchir." }
    ]
  },
  {
    id: 3,
    emoji: "💡",
    title: "Une invention qui pourrait changer le monde",
    type: "Texte explicatif / expositif",
    consignes: [
      "Décris ton invention clairement et en détail",
      "Explique comment elle fonctionne",
      "Présente les problèmes qu'elle résout",
      "Anticipe les questions ou objections possibles",
      "Utilise un vocabulaire technique et précis"
    ],
    strategies: "💡 Stratégies : Imagine que tu expliques ton invention à quelqu'un qui ne connaît rien au sujet. Utilise des comparaisons et des métaphores pour rendre les concepts complexes simples. Organise ton texte du général au spécifique.",
    sections: [
      { id: "plan", icon: "🗺️", title: "Idées clés & planification", hint: "Quelle est ton invention ? Quel problème résout-elle ? Comment fonctionne-t-elle ? Qui en bénéficierait ? Note tes idées." },
      { id: "intro", icon: "🚪", title: "Introduction", hint: "Présente le problème que ton invention résout. Accroche le lecteur avec une statistique ou une situation concrète avant de révéler ton invention." },
      { id: "dev1", icon: "1️⃣", title: "Développement 1 – Description de l'invention", hint: "Décris ton invention en détail. Comment est-elle faite ? Comment l'utilise-t-on ? Sois précis et clair." },
      { id: "dev2", icon: "2️⃣", title: "Développement 2 – Impact et bénéfices", hint: "Qui bénéficierait de cette invention ? Comment changerait-elle la vie quotidienne ? L'environnement ? La société ?" },
      { id: "dev3", icon: "3️⃣", title: "Développement 3 – Défis et solutions", hint: "Quels seraient les défis de fabriquer ou d'utiliser cette invention ? Comment les surmonterait-on ?" },
      { id: "concl", icon: "🏁", title: "Conclusion", hint: "Résume l'importance de ton invention. Imagine son avenir. Termine par une vision inspirante du monde avec ton invention." }
    ]
  },
  {
    id: 4,
    emoji: "📵",
    title: "Une journée sans technologie",
    type: "Texte narratif / réflexif",
    consignes: [
      "Raconte une journée entière sans utiliser aucune technologie",
      "Décris tes émotions tout au long de la journée",
      "Montre comment cette expérience t'a changé",
      "Utilise le temps des verbes de façon consistante",
      "Inclus des dialogues et des descriptions détaillées"
    ],
    strategies: "💡 Stratégies : Pense à raconter ta journée de façon chronologique (matin, midi, soir). Utilise tous tes sens pour décrire les moments. Montre comment tu te sentais au début, au milieu et à la fin – a-t-il changé ?",
    sections: [
      { id: "plan", icon: "🗺️", title: "Idées clés & planification", hint: "Qu'est-ce que tu ferais au lieu d'utiliser la technologie ? Comment te sentirais-tu ? Qu'est-ce que tu découvrirais ? Note ta journée heure par heure." },
      { id: "intro", icon: "🚪", title: "Introduction", hint: "Comment as-tu appris que tu devrais passer une journée sans technologie ? Comment t'es-tu senti à cette annonce ? Mets le lecteur dans l'ambiance." },
      { id: "dev1", icon: "1️⃣", title: "Développement 1 – Le matin sans technologie", hint: "Comment s'est passé ton réveil ? Le déjeuner ? Les premières heures ? Quelles difficultés ou surprises as-tu rencontrées ?" },
      { id: "dev2", icon: "2️⃣", title: "Développement 2 – L'après-midi : découvertes", hint: "Qu'as-tu fait de ton temps ? As-tu découvert quelque chose de nouveau sur toi-même ou sur les autres ?" },
      { id: "dev3", icon: "3️⃣", title: "Développement 3 – La soirée et les réflexions", hint: "Comment s'est terminée ta journée ? Quelles pensées as-tu eues en te couchant ? Qu'est-ce que cette journée t'a appris ?" },
      { id: "concl", icon: "🏁", title: "Conclusion", hint: "Que retiens-tu de cette expérience ? As-tu changé ta façon de voir la technologie ? Voudrais-tu recommencer ? Sois honnête et réfléchi." }
    ]
  }
];

const state = {
  currentSubject: 0,
  subjects: SUBJECTS.map(s => ({
    texts: Object.fromEntries(s.sections.map(sec => [sec.id, ""])),
    feedbacks: {},
    sectionsDone: {}
  }))
};

function wordCount(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}

function totalWords(subjectId) {
  return Object.values(state.subjects[subjectId].texts).reduce((acc, t) => acc + wordCount(t), 0);
}

function completedSections(subjectId) {
  return Object.values(state.subjects[subjectId].sectionsDone).filter(Boolean).length;
}

function renderTabs() {
  document.getElementById('subjectTabs').innerHTML = SUBJECTS.map((s, i) => `
    <button class="tab-btn ${i === state.currentSubject ? 'active' : ''}" onclick="switchSubject(${i})">
      ${s.emoji} Sujet ${i+1}
    </button>
  `).join('');
}

function renderSubject() {
  const s = SUBJECTS[state.currentSubject];
  const sub = state.subjects[state.currentSubject];
  const total = totalWords(state.currentSubject);
  const done = completedSections(state.currentSubject);
  const pct = Math.min(100, Math.round((done / s.sections.length) * 100));

  const encouragements = [
    "🌟 Tu fais un excellent travail, continue !",
    "🚀 Chaque mot compte ! Tu avances bien !",
    "💪 Les grands écrivains ont tous commencé comme toi !",
    "✨ Chaque section terminée est une victoire !",
    "🎯 Tu es sur la bonne voie vers un niveau 4 !"
  ];
  const enc = encouragements[Math.floor(Math.random() * encouragements.length)];

  const sectionsHtml = s.sections.map((sec, idx) => {
    const text = sub.texts[sec.id] || "";
    const feedback = sub.feedbacks[sec.id];
    const isDone = sub.sectionsDone[sec.id];
    const statusClass = isDone ? 'done' : 'todo';
    const statusLabel = isDone ? '✅ Terminée' : '⬜ À faire';
    return `
      <div class="section-block ${isDone ? 'done' : ''}" id="block-${sec.id}">
        <div class="section-header" onclick="toggleSection('${sec.id}')">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title">${sec.title}</span>
          <span class="sec-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="section-body ${idx === 0 ? 'open' : ''}" id="body-${sec.id}">
          <div class="section-hint">${sec.hint}</div>
          <textarea id="txt-${sec.id}" placeholder="Écris ici ta réponse pour cette section..." oninput="onTextInput('${sec.id}')">${text}</textarea>
          <div style="display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;">
            <button class="btn-verify" id="btn-${sec.id}" onclick="verifySection('${sec.id}')">
              <span id="btn-icon-${sec.id}">🔍</span> Vérifier mon travail
            </button>
            <span style="font-size:.82rem;color:var(--gray);" id="wc-sec-${sec.id}">
              ${wordCount(text)} mot${wordCount(text) !== 1 ? 's' : ''}
            </span>
          </div>
          <div id="feedback-${sec.id}">
            ${feedback ? renderFeedback(feedback) : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  let globalHtml = '';
  if (done === s.sections.length) {
    const lvl = total >= 300 ? (done >= 5 ? 4 : 3) : 2;
    globalHtml = `
      <div class="global-score-card">
        <h3>🎉 Bravo ! Tu as terminé ce sujet !</h3>
        <div class="level-circle">${lvl}</div>
        <p>Tu as écrit <strong>${total} mots</strong> et complété toutes les sections avec succès.<br>
        Niveau ${lvl} OQRE – ${lvl === 4 ? 'Excellent travail !' : lvl === 3 ? 'Très bon travail !' : 'Bon effort, continue !'}</p>
        <div class="badges-row">
          <div class="badge">✍️ Écrivain accompli</div>
          <div class="badge">🏆 ${total} mots écrits</div>
          <div class="badge">⭐ Niveau ${lvl}</div>
        </div>
      </div>
    `;
  }

  document.getElementById('subjectContent').innerHTML = `
    <div class="encourage-bar">${enc}</div>
    <div class="subject-card">
      <div class="subject-header">
        <div class="subject-emoji">${s.emoji}</div>
        <div class="subject-meta">
          <h2>${s.title}</h2>
          <span class="type-badge">${s.type}</span>
        </div>
      </div>
      <div class="consignes">
        <h3>📋 Critères de réussite</h3>
        <ul>${s.consignes.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>
      <div class="strategies">
        <h3>Stratégies d'écriture</h3>
        <p>${s.strategies}</p>
      </div>
      <div class="progress-area">
        <div class="progress-label">
          <span>Progression : ${done}/${s.sections.length} sections terminées</span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="word-count-area">
        <div class="word-count-pill ${total >= 300 ? 'ok' : ''}">
          📝 <span class="count">${total}</span> / 300 mots minimum
          ${total >= 300 ? ' ✅' : ''}
        </div>
      </div>
      <div class="sections">${sectionsHtml}</div>
    </div>
    ${globalHtml}
  `;
}

function switchSubject(id) {
  state.currentSubject = id;
  renderTabs();
  renderSubject();
}

function toggleSection(secId) {
  document.getElementById(`body-${secId}`).classList.toggle('open');
}

function onTextInput(secId) {
  const txt = document.getElementById(`txt-${secId}`).value;
  state.subjects[state.currentSubject].texts[secId] = txt;
  const wc = wordCount(txt);
  const el = document.getElementById(`wc-sec-${secId}`);
  if (el) el.textContent = `${wc} mot${wc !== 1 ? 's' : ''}`;
}

async function verifySection(secId) {
  const s = SUBJECTS[state.currentSubject];
  const sec = s.sections.find(x => x.id === secId);
  const text = document.getElementById(`txt-${secId}`).value.trim();

  if (wordCount(text) < 20) {
    alert("✏️ Écris au moins quelques phrases avant de vérifier !");
    return;
  }

  const btn = document.getElementById(`btn-${secId}`);
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Rétroaction en cours...`;

  const prompt = `Tu es un enseignant expert en écriture français de 6e année en Ontario, spécialisé dans la préparation à l'OQRE. Tu dois corriger le texte d'un élève de 11-12 ans pour la section "${sec.title}" du sujet "${s.title}" (type : ${s.type}).

Texte de l'élève :
"""
${text}
"""

Réponds UNIQUEMENT en JSON valide avec cette structure exacte (sans balises markdown, sans texte avant ou après) :
{
  "score": "[X/10]",
  "niveau": "[1, 2, 3 ou 4]",
  "forces": "[Ce que l'élève réussit bien – 2-3 points précis et encourageants]",
  "ameliorer": "[Ce qui doit être amélioré – 2-3 points précis et clairs]",
  "comment": "[Comment améliorer – conseils concrets étape par étape, langage simple pour un enfant de 11 ans]",
  "exemple": "[Donne un exemple de phrase améliorée tirée du texte de l'élève]",
  "prochaine_etape": "[Une seule action concrète et simple pour la prochaine section]",
  "version_corrigee": "[Version corrigée du texte de l'élève : corrige l'orthographe, la grammaire, la ponctuation, la structure. Garde les mots de l'élève autant que possible.]",
  "version_amelioree": "[Version améliorée de niveau A/4 : réécris le texte avec un vocabulaire plus riche, des idées mieux développées, des connecteurs logiques, tout en gardant l'essence des idées de l'élève.]",
  "message_encourage": "[Un message super encourageant de 1-2 phrases pour motiver l'élève à continuer]"
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json",
        "x-api-key": "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",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    const raw = data.content.map(i => i.text || "").join("");
    const clean = raw.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
    const fb = JSON.parse(clean);

    state.subjects[state.currentSubject].feedbacks[secId] = fb;
    state.subjects[state.currentSubject].sectionsDone[secId] = true;

    const block = document.getElementById(`block-${secId}`);
    if (block) {
      block.classList.add('done');
      const statusEl = block.querySelector('.sec-status');
      if (statusEl) { statusEl.className = 'sec-status done'; statusEl.textContent = '✅ Terminée'; }
    }

    document.getElementById(`feedback-${secId}`).innerHTML = renderFeedback(fb);
    renderSubject();

    setTimeout(() => {
      document.getElementById(`feedback-${secId}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

  } catch(e) {
    document.getElementById(`feedback-${secId}`).innerHTML = `
      <div style="background:var(--red-light);border-radius:10px;padding:14px;margin-top:12px;color:var(--red);font-weight:700;">
        ⚠️ Une erreur s'est produite. Vérifie ta connexion et réessaie dans quelques instants.
      </div>`;
    btn.disabled = false;
    btn.innerHTML = `<span>🔍</span> Vérifier mon travail`;
  }
}

function renderFeedback(fb) {
  return `
    <div class="feedback-card">
      <div class="feedback-header">
        <span style="font-size:1.3rem">🌟</span>
        <h4>Rétroaction pour toi ✨</h4>
        <div class="score-badge">${fb.score} · Niveau ${fb.niveau}</div>
      </div>
      <div class="feedback-body">
        <div style="background:var(--green-light);border-radius:10px;padding:12px 16px;margin-bottom:12px;border-left:4px solid var(--green);">
          <strong style="color:var(--green);">💬 ${fb.message_encourage}</strong>
        </div>
        <table class="feedback-table">
          <thead>
            <tr>
              <th>✅ Ce que tu réussis</th>
              <th>⚠️ À améliorer</th>
              <th>🛠️ Comment améliorer</th>
              <th>💡 Exemple concret</th>
              <th>➡️ Prochaine étape</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="good">${fb.forces}</td>
              <td class="improve">${fb.ameliorer}</td>
              <td class="how">${fb.comment}</td>
              <td class="example">${fb.exemple}</td>
              <td class="next">${fb.prochaine_etape}</td>
            </tr>
          </tbody>
        </table>
        <div class="versions-area">
          <h4>📄 Versions améliorées de ton texte</h4>
          <div class="version-block corrected">
            <div class="version-label corrected">✅ Version corrigée (tes idées, mieux écrites)</div>
            ${fb.version_corrigee}
          </div>
          <div class="version-block improved">
            <div class="version-label improved">⭐ Version améliorée de niveau 4</div>
            ${fb.version_amelioree}
          </div>
        </div>
      </div>
    </div>
  `;
}

renderTabs();
renderSubject();
</script>
</body>
</html>
